notes: >
  False positive test case. The agent originally flagged hypershift #8194
  (builder image update from 4.22 to 4.23) with score 92, constructing a
  plausible but incorrect causal chain: builder image SDK changes leading
  to auth library changes leading to Azure Graph API authentication
  failure. The actual failure was an Azure-side Graph API auth issue that
  resolved on its own without any code revert. The PR was NOT reverted.
  This case tests the agent's ability to distinguish cloud-provider-side
  platform issues from code regressions. The correct outcome is zero
  revert candidates, since the AKS e2e failure was caused by Azure
  infrastructure, not by the builder image change. This is one of the
  key failure modes identified in the analysis: 33% of high-confidence
  recommendations were false positives, with Azure/cloud platform issues
  being a primary category.

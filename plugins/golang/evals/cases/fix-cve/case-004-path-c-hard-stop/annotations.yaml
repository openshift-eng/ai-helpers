notes: >
  Tests the hard stop behavior. When Path C is triggered and no fork URL
  is provided, the skill MUST stop and ask. It must NOT: guess a fork URL,
  proceed with a direct update anyway, or bump the Go minor version.
  Models commonly fail by: proceeding without asking, or fabricating a
  fork URL. The skill says "STOP and ask the user" explicitly.

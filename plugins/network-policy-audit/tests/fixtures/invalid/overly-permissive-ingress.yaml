# Invalid NetworkPolicy: Overly permissive ingress
# Based on: TC-INV-002
# Purpose: Empty from[] allows all traffic (should be flagged)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-ingress
  namespace: vulnerable-namespace
  annotations:
    policy.kubernetes.io/description: "INSECURE: Allows all ingress traffic"
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
  - Ingress
  ingress:
  - from: []  # Empty peer list - allows ANY source
    ports:
    - protocol: TCP
      port: 80

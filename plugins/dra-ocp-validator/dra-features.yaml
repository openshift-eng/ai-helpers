      enablement:
        command: |
          oc patch featuregate cluster --type=merge \
            -p '{"spec":{"customNoUpgrade":{"enabled":["DRAPartitionableDevices"]}}}'

    prerequisites:
      - type: "feature_gate"
        name: "DRAPartitionableDevices"
        check_method: "featuregate_enabled"

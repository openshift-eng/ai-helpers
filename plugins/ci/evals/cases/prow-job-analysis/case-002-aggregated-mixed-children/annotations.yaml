expected_failure_type: test
expected_references:
  - aggregated.md
  - flaky-test-identification.md
  - disruption.md
expected_root_cause_category: aggregated-statistical-regression

notes: >
  Aggregated blocking job that fails its pass-rate threshold. Retries only
  re-run the aggregation analysis — they do NOT re-run the child jobs — so only
  the final attempt carries signal. The child runs fail for MIXED reasons: some
  are within-threshold disruption noise, but at least one child shows a genuine
  conformance regression.

  The agent MUST route to aggregated.md and perform statistical analysis rather
  than debugging individual tests as if this were a single run. It must extract
  the underlying child job name from the junit-aggregated.xml <system-out>
  humanurl fields (the underlying name cannot be derived from the aggregated
  name), then triage the failing child via flaky-test-identification.md and
  attribute disruption via disruption.md. The discriminating skill is separating
  the real regression from aggregated flake/noise.

expected_failure_type: test
expected_references:
  - aggregated.md
  - test-failure.md
  - upgrade.md
expected_root_cause_category: aggregated-deterministic-test-failure

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  The release-analysis-aggregator failed because a set of
  [Feature:NetworkSegmentation] UserDefinedNetwork [sig-network] conformance
  tests failed deterministically in every aggregated run ("Passed 0 times,
  failed 9 times ... we require at least one pass"), so those tests could not
  meet the aggregation pass requirement and the aggregator reported "Some tests
  failed aggregation." It is a real, reproducible product test regression across
  the child runs, NOT a statistical disruption-threshold breach.

# VERBATIM strings that MUST appear in the cited artifact. Every string below was
# fetched from the public test-platform-results bucket and grep-confirmed present.
expected_evidence:
  - string: "aggregating 10 related jobRuns"
    artifact: "build-log.txt"
  - string: "[Feature:NetworkSegmentation][ovn-kubernetes-ote][sig-network] Network Segmentation when primary network exist, UserDefinedNetwork status should report not-ready"
    artifact: "build-log.txt"
  - string: "Passed 0 times, failed 9 times, skipped 0 times: we require at least one pass to consider it a success"
    artifact: "build-log.txt"
  - string: "Some tests failed aggregation.  See above for details."
    artifact: "build-log.txt"

# Aggregated child-run tally. runs_aggregated is the number of related jobRuns
# the aggregator collected; total/passed/failed is the per-test result across the
# runs that executed each failing NetworkSegmentation UDN test (0 pass, 9 fail).
expected_child_breakdown:
  runs_aggregated: 10
  total: 9
  passed: 0
  failed: 9
  aggregation_verdict: "Some tests failed aggregation.  See above for details."
  aggregation_verdict_artifact: "build-log.txt"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The aggregator ran its per-backend disruption checks ("running aggregated
  disruption tests") and they stayed within thresholds (each backend's measured
  disruption is below its failureThreshold), while the NetworkSegmentation
  UserDefinedNetwork tests failed in 9 of 9 runs with zero passes. The
  deterministic 0-pass conformance result, not disruption, is what failed
  aggregation.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "The aggregator computes many per-backend disruption metrics ('running aggregated disruption tests'), tempting a 'disruption threshold exceeded' verdict even though every backend stays under its failureThreshold."
  - "Individual disruption backends list non-empty per-run 'failures=[...]' entries that look alarming but remain below the failureThreshold and do not fail aggregation."
  - "The underlying variant is an upgrade job (ci-5.0-upgrade-from-stable-4.22-e2e-aws-ovn-upgrade), tempting an upgrade-mechanics / etcd-disruption root cause."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "aggregated disruption threshold breach or disruption-driven failure"
  - "infrastructure problem or single-run flake (the failures are deterministic across all runs)"
  - "a defect isolated to one child run (the aggregator evaluates the test across all runs)"

notes: >
  Aggregated blocking job (release-analysis-aggregator) over the AWS OVN upgrade
  variant periodic-ci-openshift-release-main-ci-5.0-upgrade-from-stable-4.22-e2e-aws-ovn-upgrade
  for payload 5.0.0-0.ci-2026-07-02-033641. The aggregator collected 10 related
  jobRuns and failed with "Some tests failed aggregation." because a group of
  [Feature:NetworkSegmentation] UserDefinedNetwork [sig-network] conformance
  tests each "Passed 0 times, failed 9 times" — a deterministic product test
  regression, reproducible across every run.

  The agent MUST route to aggregated.md and perform statistical analysis across
  the child runs rather than debugging a single run, then use test-failure.md to
  root-cause the failing NetworkSegmentation UDN tests. The key discriminator is
  that the aggregated disruption tests were computed but stayed WITHIN their
  thresholds; disruption is a distractor here, not the cause. The agent must NOT
  attribute the failure to disruption thresholds, to infrastructure, or to a
  single-run flake.

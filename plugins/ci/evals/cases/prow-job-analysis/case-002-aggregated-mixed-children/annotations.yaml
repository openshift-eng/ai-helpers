expected_failure_type: test
expected_references:
  - aggregated.md
  - upgrade.md
  - disruption.md
expected_root_cause_category: aggregated-disruption-threshold

notes: >
  Aggregated blocking job (release-analysis-aggregator) over an AWS OVN upgrade
  variant. The aggregator fans out to a set of child runs (5 pass, 4 fail) and
  fails because API/backend disruption thresholds were exceeded across the
  failing children rather than because of a single deterministic test bug.

  The agent MUST route to aggregated.md and perform statistical analysis rather
  than debug a single run. It must inspect the child job results, attribute the
  failures to disruption metrics (via disruption.md) in the upgrade phase (via
  upgrade.md), and identify the exceeded disruption thresholds as the
  aggregation failure trigger — separating real signal from aggregated noise.

expected_failure_type: test
expected_references:
  - upgrade.md
  - test-failure.md
expected_root_cause_category: mco-machineconfig-timeout

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  In the network-flow-matrix-tests step the commatrix "Nftables" e2e test created
  a MachineConfig (98-nftables-commatrix-master) on the master pool and then
  blocked waiting for the master MachineConfigPool to enter the Updating state.
  That transition was never observed within the 1200s (20m) timeout, so the test
  failed at test/pkg/cluster/cluster.go:57 with "Timed out waiting for MCP to
  start updating". The cluster was otherwise healthy — still on 4.18 (no upgrade
  ran) with the master MCP ending Updated=True/Updating=False/Degraded=False on a
  rendered config generated right after the test's MachineConfig.

# VERBATIM strings that MUST appear in the cited artifact. Every string below was
# fetched from the public test-platform-results bucket and grep-confirmed present.
expected_evidence:
  - string: "Running e2e 'Nftables' test suite"
    artifact: "artifacts/e2e-aws-upgrade-ovn-single-node-network-flow-matrix/network-flow-matrix-tests/build-log.txt"
  - string: "MachineConfig created successfully."
    artifact: "artifacts/e2e-aws-upgrade-ovn-single-node-network-flow-matrix/network-flow-matrix-tests/build-log.txt"
  - string: "Timed out waiting for MCP to start updating"
    artifact: "artifacts/e2e-aws-upgrade-ovn-single-node-network-flow-matrix/network-flow-matrix-tests/build-log.txt"
  - string: "98-nftables-commatrix-master"
    artifact: "artifacts/e2e-aws-upgrade-ovn-single-node-network-flow-matrix/gather-extra/artifacts/oc_cmds/machineconfigs"
  - string: "master   rendered-master-cef4e0c54a2dbd3068b6b8b5e8c0c2c9   True      False      False"
    artifact: "artifacts/e2e-aws-upgrade-ovn-single-node-network-flow-matrix/gather-extra/artifacts/oc_cmds/machineconfigpools"
  - string: "Cluster version is 4.18.0-0.nightly-2026-07-02-114801"
    artifact: "artifacts/e2e-aws-upgrade-ovn-single-node-network-flow-matrix/gather-extra/artifacts/oc_cmds/clusterversion"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The step's own build-log ends with a Ginkgo timeout — "Timed out waiting for
  MCP to start updating" at test/pkg/cluster/cluster.go:57 — the test blocked on
  the MachineConfigPool entering Updating, not on the nftables firewall
  assertion. Install and the cluster were healthy (ClusterVersion Available,
  Progressing=False, still 4.18; master MCP Updated=True, Degraded=False), so
  this is a MachineConfig/MCP rollout-observation timeout inside the test, not an
  infra, install, or upgrade failure.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "The job/variant name says upgrade-from-stable-4.18, but no upgrade step ran and ClusterVersion stays on 4.18 with Progressing=False — there was no upgrade to blame."
  - "The suite is the nftables firewall test, tempting a networking/nftables/OVN root cause, but the test times out BEFORE it ever verifies firewall rules (it fails while waiting for the MCP)."
  - "The MCO actually generated a new rendered master config (rendered-master-cef4e0...) at the same time as 98-nftables-commatrix-master and the pool is Updated=True/Degraded=False — so the pool was neither stuck nor degraded; the test never observed the Updating transition it was polling for."
  - "'make: *** [Makefile:119: e2e-test] Error 1' and 'Container test exited with code 2' are generic wrappers around the single Ginkgo failure, not independent causes."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "an infrastructure / build-farm failure (the test ran to completion and failed on a functional timeout, not pod scheduling or a lease)"
  - "an install failure (ipi-install-install-stableinitial succeeded; the cluster is Available on 4.18)"
  - "an upgrade or upgrade-mechanics failure (no upgrade was performed in this run)"
  - "a defect in the nftables/firewall assertion itself (the test never reached firewall verification)"

notes: >
  Single-node (SNO) AWS OVN job (network-flow-matrix variant). Despite the
  "upgrade-from-stable-4.18" name, no upgrade step ran: after install of 4.18 the
  test phase went straight to network-flow-matrix-tests, and ClusterVersion stays
  at 4.18.0-0.nightly-2026-07-02-114801 with Progressing=False. In that step the
  commatrix "Nftables" test created MachineConfig 98-nftables-commatrix-master and
  then timed out after 1200s "waiting for MCP to start updating"
  (test/pkg/cluster/cluster.go:57), failing the Ginkgo spec and the step.

  RE-VERIFIED against artifacts: the earlier framing ("after the upgrade" / "the
  MCO never began rolling the pool") is not supported. No upgrade occurred, and
  the MCO did render a new master config (rendered-master-cef4e0...) right after
  the test's MachineConfig, with the master MCP ending
  Updated=True/Updating=False/Degraded=False — the pool was healthy; the test
  simply never observed the Updating transition within its timeout.

  The agent MUST identify the MachineConfig/MachineConfigPool timeout as the
  bottleneck (route via upgrade.md, which owns MachineConfigPool mechanics, and
  test-failure.md) and MUST NOT blame the nftables assertion, an install/infra
  failure, or a (non-existent) upgrade.

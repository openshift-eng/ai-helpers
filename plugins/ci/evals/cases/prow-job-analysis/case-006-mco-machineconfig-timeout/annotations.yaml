expected_failure_type: test
expected_references:
  - upgrade.md
  - test-failure.md
expected_root_cause_category: mco-machineconfig-timeout

notes: >
  Single-node AWS OVN upgrade (network-flow-matrix). After the upgrade, the
  nftables network-flow test timed out waiting for the MachineConfigPool to
  start updating after a MachineConfig was applied — the MCO never began rolling
  the pool, so the test could not observe the expected config change.

  The agent MUST identify the Machine Config Operator / MachineConfigPool as the
  bottleneck (route via upgrade.md and test-failure.md), not blame the test
  logic itself. The discriminating signal is the MCP failing to transition to
  Updating, not a defect in the nftables assertion.

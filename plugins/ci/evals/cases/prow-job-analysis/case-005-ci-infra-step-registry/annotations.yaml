expected_failure_type: infra
expected_references:
  - ci-infrastructure-changes.md
  - artifacts.md
expected_root_cause_category: ci-step-registry-change

notes: >
  CI-infrastructure failure, NOT a product bug. A vSphere UPI job fails inside a
  step-registry step shortly after openshift/release changed that step's script
  (e.g. a mirror/registry URL migration, a changed environment variable, or a
  lease-type change). The failure output references the changed value — a curl
  error to a new domain, or "SUBNETS.JSON does not contain enough addresses ...
  expected a single-tenant lease". Such changes NEVER appear in a payload
  changelog.

  The agent must recognize this via ci-infrastructure-changes.md (distinguish
  "CI config changed" from "product broke"), use artifacts.md to find the exact
  failing step's build log, extract the precise error, then search
  openshift/release for commits merged BEFORE the job's start time that touch
  that step. The trap is misattributing the failure to a product component PR.
  Correct classification: infra / ci-step-registry-change, no product revert.

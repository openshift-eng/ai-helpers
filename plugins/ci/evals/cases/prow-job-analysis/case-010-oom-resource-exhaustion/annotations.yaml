expected_failure_type: test
expected_references:
  - resource-exhaustion.md
  - disruption.md
expected_root_cause_category: memory-exhaustion-oomkill

notes: >
  Resource-exhaustion failure on single-node OpenShift (SNO). A pod (or etcd) is
  OOMKilled at its memory limit (pod status shows OOMKilled / exit code 137); the
  single node then hits MemoryPressure and briefly goes NotReady, which cascades
  into many downstream test failures and API blips.

  The agent must route to resource-exhaustion.md (OOM / node pressure) and use
  disruption.md for the resulting API disruption, then trace back to the SPECIFIC
  container that was OOMKilled at its limit and the memory-pressure timeline —
  not stop at the loud symptom ("many tests failed" or "node NotReady"). On SNO
  there is no failover, so a single OOM cascades widely; identifying the
  originating OOM (not the cascade) is the key signal.

expected_failure_type: install
expected_references:
  - install/general.md
  - install/metal.md
expected_root_cause_category: metal-provisioning-environment

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  The Metal IPI install never reached provisioning. The dev-scripts environment
  prep (make target "requirements" -> 01_install_requirements.sh) aborted
  because the external EPEL repository mirrors were unreachable, so the
  "packages_installation : Refresh DNF cache" Ansible task could not download
  the 'epel' repo metadata. This is an external mirror/network outage during
  host setup in the baremetalds-devscripts-setup step, not a product regression
  or a cloud-provider install error.

# VERBATIM strings that MUST appear in the cited artifact. Every string below was
# fetched from the public test-platform-results bucket and grep-confirmed present.
expected_evidence:
  - string: "Failed to download metadata for repo 'epel'"
    artifact: "artifacts/e2e-metal-ipi-ovn-ipv6/baremetalds-devscripts-setup/build-log.txt"
  - string: "Cannot download, all mirrors were already tried without success"
    artifact: "artifacts/e2e-metal-ipi-ovn-ipv6/baremetalds-devscripts-setup/build-log.txt"
  - string: "make: *** [Makefile:68: requirements] Error 2"
    artifact: "artifacts/e2e-metal-ipi-ovn-ipv6/baremetalds-devscripts-setup/build-log.txt"
  - string: "TASK [packages_installation : Refresh DNF cache]"
    artifact: "artifacts/e2e-metal-ipi-ovn-ipv6/baremetalds-devscripts-setup/build-log.txt"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The DNF cache refresh for the 'epel' repo fails with "all mirrors were already
  tried without success" during baremetalds-devscripts-setup, BEFORE any
  openshift-install / Ironic / Metal3 provisioning runs. epel-release itself
  installed successfully earlier in the same log; it is the subsequent epel repo
  metadata refresh (an external mirror outage) that aborts the make target.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "epel-release-9-10.el9.noarch installs successfully earlier in the same log, so a shallow read may conclude EPEL was fine."
  - "Post-abort noise: 'File ... auth/kubeconfig not found', missing /root/dev-scripts/ocp/*/auth, and 'Error: INVALID_ZONE: libvirt' are consequences of the aborted setup, not the root cause."
  - "The job name contains metal-ipi / ovn, tempting an OVN/SDN networking or Metal3 provisioning root cause even though provisioning never started."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "product regression or code bug in the installer or an operator"
  - "generic cloud-provider install failure (this is bare-metal dev-scripts; there is no cloud API error)"
  - "OVN/SDN or networking-operator bug"
  - "generic flake without identifying the external EPEL mirror outage"

notes: >
  Metal IPI install failure. During baremetalds-devscripts-setup the make
  "requirements" target ran 01_install_requirements.sh, whose Ansible task
  "packages_installation : Refresh DNF cache" failed because the external 'epel'
  repository mirrors were unreachable ("Failed to download metadata for repo
  'epel' ... Cannot download, all mirrors were already tried without success").
  The step aborted with "make: *** [Makefile:68: requirements] Error 2" and the
  install never reached Ironic/Metal3 provisioning.

  The job name contains metal-ipi, so the agent MUST recognize a metal job and
  use BOTH install/general.md and install/metal.md. It must trace through the
  Ansible/DNF errors in the dev-scripts setup log and identify this as a
  pre-provisioning environment failure (an external mirror outage), NOT a
  product regression or a generic cloud install failure. Note that epel-release
  installed fine earlier in the same log; the failure is the later epel repo
  metadata refresh.

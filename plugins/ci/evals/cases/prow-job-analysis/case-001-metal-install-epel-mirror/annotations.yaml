expected_failure_type: install
expected_references:
  - install/general.md
  - install/metal.md
expected_root_cause_category: metal-provisioning-environment

notes: >
  Metal IPI install failure. The EPEL mirror was unavailable during
  baremetalds-devscripts-setup ("Failed to download metadata for repo 'epel'
  ... all mirrors were already tried without success"), so
  01_install_requirements.sh aborted with "make: *** [requirements] Error 2"
  and the install never reached Ironic/Metal3 provisioning.

  The job name contains metal-ipi, so the agent MUST recognize a metal job and
  use BOTH install/general.md and install/metal.md. It must trace through the
  Ansible/DNF errors in the dev-scripts setup log and identify this as a
  pre-provisioning environment failure (an external mirror outage), NOT a
  product regression or a generic cloud install failure.

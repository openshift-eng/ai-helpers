expected_failure_type: infra
expected_references:
  - cloud-provider-errors.md
expected_root_cause_category: cloud-quota-exhaustion

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  The GCP shared-VPC (XPN) e2e job failed in its ipi-conf-gcp-xpn PRE step, which
  runs `gcloud compute networks create` to provision the shared-VPC host-project
  network before install. GCP rejected the request with "Quota 'NETWORKS'
  exceeded.  Limit: 50.0 globally." (metric compute.googleapis.com/networks,
  limit NETWORKS-per-project), so the host network was never created and
  openshift-install never ran. This is cloud-provider network quota exhaustion
  (CI infrastructure), not a product/installer or networking-operator bug.

# VERBATIM strings that MUST appear in the cited artifact. Every string below was
# fetched from the public test-platform-results bucket and grep-confirmed present.
expected_evidence:
  - string: "Configuring GCP Subnets for Host Project..."
    artifact: "artifacts/e2e-gcp-ovn-xpn/ipi-conf-gcp-xpn/build-log.txt"
  - string: "ERROR: (gcloud.compute.networks.create) Could not fetch resource:"
    artifact: "artifacts/e2e-gcp-ovn-xpn/ipi-conf-gcp-xpn/build-log.txt"
  - string: "Quota 'NETWORKS' exceeded.  Limit: 50.0 globally."
    artifact: "artifacts/e2e-gcp-ovn-xpn/ipi-conf-gcp-xpn/build-log.txt"
  - string: "metric name = compute.googleapis.com/networks"
    artifact: "artifacts/e2e-gcp-ovn-xpn/ipi-conf-gcp-xpn/build-log.txt"
  - string: "limit name = NETWORKS-per-project"
    artifact: "artifacts/e2e-gcp-ovn-xpn/ipi-conf-gcp-xpn/build-log.txt"
  - string: "Step phase pre failed after"
    artifact: "build-log.txt"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  An affirmative GCP API quota error — "Quota 'NETWORKS' exceeded.  Limit: 50.0
  globally." from gcloud.compute.networks.create — is emitted during the
  ipi-conf-gcp-xpn PRE step, before openshift-install runs. The failing action is
  the CI helper creating the shared-VPC host-project network, and the failure is
  a project-wide NETWORKS quota (limit 50), so no cluster, installer, or cluster
  operator ever ran.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "The XPN teardown post-step (ipi-conf-gcp-xpn-post) also errors with 'The resource projects/openshift-dev-installer/global/firewalls/ci-op-prkbbp9n-5b8ff was not found', but that is a cleanup consequence of the aborted setup (the firewall was never created), not the root cause."
  - "The gcloud output begins with 'No credentialed accounts.', tempting an auth/credentials root cause, but the very next line shows 'Activated service account credentials for: [do-not-delete-ci-provisioner@...]', so authentication succeeded."
  - "The job name contains ovn and xpn (shared-VPC networking), tempting an OVN-Kubernetes/SDN or networking-operator root cause even though no cluster network operator ever ran."
  - "The failing step is named ipi-conf-gcp-xpn, which sounds like an installer/install-config problem, but it is a CI helper step provisioning the host-project VPC and the failure is a cloud quota, not a config or product bug."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "product regression or code bug in the installer or a networking/cluster operator"
  - "OVN/SDN or networking-operator failure"
  - "authentication or credentials failure (the service account was activated successfully)"
  - "generic flake or transient error without identifying the specific GCP NETWORKS quota exhaustion (limit 50)"

notes: >
  GCP shared-VPC (XPN) job failure caused by a GCP quota error. In the pre phase
  the ipi-conf-gcp-xpn step runs `gcloud compute networks create` to configure
  the shared-VPC host-project subnets; GCP rejected it with "Quota 'NETWORKS'
  exceeded.  Limit: 50.0 globally." (metric compute.googleapis.com/networks,
  limit NETWORKS-per-project), so the step failed and openshift-install never
  started.

  The agent MUST route to cloud-provider-errors.md, find the specific GCP
  NETWORKS quota error string, and classify the failure as cloud-provider
  infrastructure (quota exhaustion) — NOT a product bug in the installer or
  networking operators, NOT an auth failure (credentials were activated
  successfully), and NOT the downstream ipi-conf-gcp-xpn-post cleanup error.
  Absence of a code explanation is not what makes this infra; the affirmative
  quota error is.

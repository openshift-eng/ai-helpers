expected_failure_type: upgrade
expected_references:
  - upgrade.md
  - networking.md
expected_root_cause_category: upgrade-network-operator-not-settled

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  After the two-node-arbiter day-2-workers upgrade, the blocking upgrade
  invariant "[sig-cluster-lifecycle] ClusterOperators are available and not
  degraded after upgrade" failed because clusteroperator/network did not settle:
  it stayed Progressing for ~11m47s waiting on the
  openshift-multus/network-metrics-daemon and
  openshift-network-operator/iptables-alerter DaemonSets, which were "not
  available (awaiting 1 nodes)" — one node never became available to host them.
  It is post-upgrade network-operator non-convergence caused by a missing/
  not-ready node, NOT etcd instability or a disruption-threshold breach.

# VERBATIM strings, grep-confirmed present in their cited artifact.
expected_evidence:
  - string: "ClusterOperators did not settle:"
    artifact: "artifacts/e2e-metal-ovn-two-node-arbiter-upgrade-day-2-workers/baremetalds-e2e-test/artifacts/junit/junit_upgrade__20260702-044127.xml"
  - string: "clusteroperator/network is Progressing for 11m47.373176993s because"
    artifact: "artifacts/e2e-metal-ovn-two-node-arbiter-upgrade-day-2-workers/baremetalds-e2e-test/artifacts/junit/junit_upgrade__20260702-044127.xml"
  - string: "is not available (awaiting 1 nodes)"
    artifact: "artifacts/e2e-metal-ovn-two-node-arbiter-upgrade-day-2-workers/baremetalds-e2e-test/artifacts/junit/junit_upgrade__20260702-044127.xml"
  - string: "/openshift-multus/network-metrics-daemon"
    artifact: "artifacts/e2e-metal-ovn-two-node-arbiter-upgrade-day-2-workers/baremetalds-e2e-test/artifacts/junit/junit_upgrade__20260702-044127.xml"
  - string: "[sig-arch][Feature:ClusterUpgrade] Cluster should remain functional during upgrade [Disruptive] [Serial]"
    artifact: "build-log.txt"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The failing upgrade invariant is "ClusterOperators are available and not
  degraded after upgrade", and the junit failure names exactly one operator:
  clusteroperator/network stuck Progressing because two network DaemonSets are
  "awaiting 1 nodes". The many transient disruption samples during the upgrade
  (console, oauth, image-registry, API backends "stopped responding") are
  symptoms, not the blocking cause.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "Numerous disruption samples fire during the upgrade — image-registry, ingress-to-console, ingress-to-oauth-server and API backends 'stopped responding to GET requests' — tempting a disruption-threshold root cause."
  - "The parent blocking test is named 'Cluster should remain functional during upgrade [Disruptive] [Serial]', which sounds like pure disruption rather than an operator failing to settle."
  - "etcd test binaries (cluster-etcd-operator-tests-ext) are extracted/mirrored during setup, which can be misread as etcd being the failing component."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "etcd connection storms or etcd instability caused the failure"
  - "a disruption-threshold breach was the blocking failure"
  - "the network ClusterOperator went Degraded (it was Progressing / not settled, awaiting a node)"
  - "generic upgrade flake or a single failing conformance test"

notes: >
  Two-node-plus-arbiter metal upgrade (day-2 workers). The suite reported one
  blocking failure — "[sig-arch][Feature:ClusterUpgrade] Cluster should remain
  functional during upgrade [Disruptive] [Serial]" — and the upgrade-phase junit
  pins it to "[sig-cluster-lifecycle] ClusterOperators are available and not
  degraded after upgrade", which failed with "ClusterOperators did not settle:
  clusteroperator/network is Progressing for 11m47.373176993s because" the
  openshift-multus/network-metrics-daemon and
  openshift-network-operator/iptables-alerter DaemonSets were "not available
  (awaiting 1 nodes)".

  The agent MUST route to upgrade.md, read the ClusterOperators-after-upgrade
  invariant, and identify the network operator as the one that did not settle
  (networking.md) because a DaemonSet was awaiting a node. It must NOT invent
  etcd connection storms (there is no such evidence) and must NOT stop at the
  transient per-backend disruption samples, which are distractors rather than
  the blocking cause.

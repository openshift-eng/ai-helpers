expected_failure_type: upgrade
expected_references:
  - operating-system-changes.md
  - upgrade.md
  - networking.md
expected_root_cause_category: crio-rpm-regression-networkpluginnotready

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  During the out-of-change upgrade the nodes booted RHCOS carrying the regressed
  CRI-O RPM cri-o-1.35.2-11.rhaos4.22.git10e8cf6.el9. That build broke CNI/CRI
  network readiness: kubelet reported NetworkReady=false reason:NetworkPluginNotReady
  with "no CNI configuration file in /etc/kubernetes/cni/net.d/", so multiple
  workers (ip-10-0-80-8, ip-10-0-124-97, ip-10-0-29-93, ip-10-0-33-117,
  ip-10-0-24-102) went NotReady in an unpredicted way. This failed the
  [Monitor:node-lifecycle][sig-node] "detects unexpected not ready node" test and
  produced pathological NetworkNotReady events in ns/openshift-multus and
  ns/openshift-network-diagnostics. The node journal shows CRI-O later restarting
  on the prior-good 1.35.2-9.rhaos4.22.gitab2479f.el9, i.e. an OS-layer CRI-O RPM
  regression (1.35.2-9 -> 1.35.2-11), not a product code bug or a cloud/infra outage.

# VERBATIM strings, each grep-confirmed present in the cited artifact. Node journals
# under gather-extra are gzip-compressed (no .gz extension) and must be read via zcat.
expected_evidence:
  - string: "Starting CRI-O, version: 1.35.2-11.rhaos4.22.git10e8cf6.el9, git: unknown(clean)"
    artifact: "artifacts/e2e-aws-ovn-upgrade-out-of-change/gather-extra/artifacts/nodes/ip-10-0-24-102.us-west-1.compute.internal/journal"
  - string: "  cri-o-1.35.2-11.rhaos4.22.git10e8cf6.el9.x86_64"
    artifact: "artifacts/e2e-aws-ovn-upgrade-out-of-change/gather-extra/artifacts/nodes/ip-10-0-24-102.us-west-1.compute.internal/journal"
  - string: '"Node became not ready" node="ip-10-0-24-102.us-west-1.compute.internal"'
    artifact: "artifacts/e2e-aws-ovn-upgrade-out-of-change/gather-extra/artifacts/nodes/ip-10-0-24-102.us-west-1.compute.internal/journal"
  - string: "node-lifecycle reports 5 unexpected notReady events. The node went NotReady in an unpredicted way."
    artifact: "artifacts/e2e-aws-ovn-upgrade-out-of-change/openshift-e2e-test/artifacts/junit/e2e-monitor-tests__20260428-052359.xml"
  - string: "NetworkReady=false reason:NetworkPluginNotReady message:Network plugin returns error: no CNI configuration file in /etc/kubernetes/cni/net.d/. Has your network provider started?"
    artifact: "artifacts/e2e-aws-ovn-upgrade-out-of-change/openshift-e2e-test/artifacts/junit/e2e-monitor-tests__20260428-052359.xml"
  - string: "event happened 40 times, something is wrong: namespace/openshift-multus"
    artifact: "artifacts/e2e-aws-ovn-upgrade-out-of-change/openshift-e2e-test/artifacts/junit/e2e-monitor-tests__20260428-052359.xml"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The node journal shows the CRI-O version flip across a reboot on the SAME node:
  it comes up on cri-o 1.35.2-11 (git10e8cf6) at 04:49, the node goes NotReady with
  NetworkPluginNotReady, and CRI-O then restarts on the prior-good 1.35.2-9
  (gitab2479f) at 05:56. That RPM version delta correlated with node readiness is
  what pins the cause to the CRI-O/RHCOS layer rather than to OVN, the CNI operator,
  a test bug, or a cloud outage.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "Pathological NetworkNotReady events fire under ns/openshift-multus and ns/openshift-network-diagnostics, which looks like an OVN-Kubernetes / multus CNI plugin bug."
  - '"no CNI configuration file in /etc/kubernetes/cni/net.d/" resembles the network operator failing to render CNI config or a networking.md CNI-not-ready regression.'
  - "Multiple nodes going NotReady during the rollout can look like a generic upgrade-orchestration or MachineConfig rollout failure."
  - "Running on AWS with a NodeNotReady worker can look like an EC2/cloud-provider instance or kubelet-heartbeat infra outage."
  - "The e2e suite itself reports 1976 pass / 0 fail, so it can look like a flaky monitor test rather than a real regression."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "The failure is an OVN-Kubernetes or Multus CNI product-code bug."
  - "The failure is a cloud-provider / AWS infrastructure outage (instance loss, kubelet heartbeat)."
  - "The failure is a flaky or mis-scoped e2e test that should just be retried or muted."
  - "The failure is an installer or bootstrap problem (this is an upgrade run; install steps succeeded)."
  - "The root cause is the OpenShift network operator failing to write CNI config, independent of the node OS."


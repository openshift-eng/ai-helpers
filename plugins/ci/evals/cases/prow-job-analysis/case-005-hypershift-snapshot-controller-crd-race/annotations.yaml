expected_failure_type: test
expected_references:
  - hypershift.md
expected_root_cause_category: snapshot-controller-crashloop-volumegroupsnapshot-crd-race

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  The hosted-control-plane csi snapshot-controller (pod
  csi-snapshot-controller-fbbc6b999-6v4kk) is started with
  --feature-gates=CSIVolumeGroupSnapshot=true and, at startup, hard-requires the
  volumegroupsnapshots.groupsnapshot.storage.k8s.io CRD. HyperShift installs that
  CRD asynchronously, so the controller cannot list volumegroupsnapshots ("the
  server could not find the requested resource"), retries until its startup
  context expires, and exits 1 ("main.go:259 Exiting due to failure to ensure
  CRDs exist during startup: context deadline exceeded"). It crash-loops to
  restartCount 7, which fails the e2e assertion
  TestCreateCluster/ValidateHostedCluster/EnsureNoCrashingPods.

# VERBATIM strings, each grep-confirmed present in the cited artifact.
expected_evidence:
  - string: "E0611 01:58:31.443786       1 main.go:259] Exiting due to failure to ensure CRDs exist during startup: context deadline exceeded"
    artifact: "artifacts/e2e-aws-ovn/hypershift-aws-run-e2e-nested/artifacts/TestCreateCluster/namespaces/e2e-clusters-8zglk-create-cluster-5shw6/core/pods/csi-snapshot-controller-fbbc6b999-6v4kk.yaml"
  - string: "E0611 01:58:02.298437       1 main.go:121] Failed to list v1 volumegroupsnapshots with error=the server could not find the requested resource (get volumegroupsnapshots.groupsnapshot.storage.k8s.io)"
    artifact: "artifacts/e2e-aws-ovn/hypershift-aws-run-e2e-nested/artifacts/TestCreateCluster/namespaces/e2e-clusters-8zglk-create-cluster-5shw6/core/pods/csi-snapshot-controller-fbbc6b999-6v4kk.yaml"
  - string: "    - --feature-gates=CSIVolumeGroupSnapshot=true"
    artifact: "artifacts/e2e-aws-ovn/hypershift-aws-run-e2e-nested/artifacts/TestCreateCluster/namespaces/e2e-clusters-8zglk-create-cluster-5shw6/core/pods/csi-snapshot-controller-fbbc6b999-6v4kk.yaml"
  - string: "Container snapshot-controller in pod csi-snapshot-controller-fbbc6b999-6v4kk has a restartCount > 0 (7)"
    artifact: "build-log.txt"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The snapshot-controller container's own terminated-state message names the exact
  cause: it fails to list volumegroupsnapshots.groupsnapshot.storage.k8s.io
  because the CRD is absent, then exits at main.go:259 "failure to ensure CRDs
  exist during startup". That startup-time hard CRD dependency (gated by
  --feature-gates=CSIVolumeGroupSnapshot=true) is what separates this from a
  generic pod restart or a transient API blip.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "VolumeGroupSnapshot: false appears in the guest kubelet/KubeletConfig feature-gate dump — this is an unrelated kubelet feature gate, not the snapshot-controller flag, and does not explain the crash."
  - "eventually.go:105 Failed to get *v1.SelfSubjectReview ... dial tcp ... no such host / i/o timeout are transient guest-API DNS/connect blips; the test then succeeds ('Successfully waited for a successful connection to the guest API server') and the cluster rolls out, so these are not the failure."
  - "Downstream failures TestCreateClusterHABreakGlassCredentials (CRR context deadline exceeded) and the final teardown 'valid conditions in 2s: context deadline exceeded' are separate/cascading and unrelated to the snapshot-controller crash-loop."
  - "The overall parent TestCreateCluster/ValidateHostedCluster FAIL could be mistaken for a cluster-install failure, but the only failing child is EnsureNoCrashingPods."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "The hosted cluster failed to install or the control plane never came up (it did roll out and the guest API server was reachable)."
  - "This is an infra/CI-infrastructure or cloud-provider outage (the crash is a deterministic in-container CRD dependency error, reproduced 7 times)."
  - "The failure is the transient SelfSubjectReview / DNS 'no such host' error."
  - "The guest kubelet feature gate 'VolumeGroupSnapshot: false' caused the crash-loop."

notes: >
  HyperShift hosted-control-plane e2e. Route to hypershift.md as primary (hosted
  control plane component crash-loop) plus flaky-test-identification.md because the
  manifested failure is the Go e2e assertion EnsureNoCrashingPods. Failure_type is
  test: the cluster installed and the guest API was reachable; the job failed on a
  test that asserts no pod restarts, driven by the snapshot-controller crash-loop.
  Matches the hypothesis: csi-external-snapshotter v8.6.0 rebase added a hard
  VolumeGroupSnapshot CRD dependency at startup that races HyperShift's async CRD
  install. Payload 5.0.0-0.ci-2026-06-11-001513 (image tag 5.0-2026-06-11-001513).
  The alternate AKS run (2064864946398695424) is also a FAILURE and references
  snapshot-controller, but the verbatim CRD/crash-loop evidence (the container
  terminated message) is grep-confirmable on this AWS run, so it is recommended.

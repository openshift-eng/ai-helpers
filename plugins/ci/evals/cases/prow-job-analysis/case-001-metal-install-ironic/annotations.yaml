expected_failure_type: install
expected_references:
  - install/general.md
  - install/metal.md
  - artifacts.md
expected_root_cause_category: baremetal-provisioning-failure

notes: >
  Bare-metal IPI install failure. dev-scripts provisioning fails: Ironic/Metal3
  cannot deploy the ramdisk or power on a control-plane node (IPMI/Redfish power
  failure, node stuck in "deploy failed"), so bootstrap never completes and
  "install should succeed" fails before cluster creation.

  The job name contains metal-ipi, so the agent MUST recognize a metal job and
  use BOTH install/general.md (installer workflow, failed-stage identification)
  and install/metal.md (dev-scripts, Metal3/Ironic, libvirt, sosreport) — metal
  install analysis requires both files. The root cause must be traced into the
  dev-scripts / Ironic artifacts (a specific provisioning/power error), not
  reported as a generic cloud install failure or a product regression.

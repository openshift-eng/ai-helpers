expected_failure_type: infra
expected_references:
  - cloud-provider-errors.md
expected_root_cause_category: cloud-machine-provisioning-failure

# The single conclusion a correct analysis MUST reach.
expected_root_cause: >-
  The e2e-gcp-ovn-serial "nodes-readiness" pre-test step timed out after 30
  minutes waiting for 6 Ready nodes but only ever found 5, because one of the
  three worker Machines (ci-op-nrvxty03-c278a-7wv2c-worker-c-b2tjb, zone
  us-central1-c) went to phase "Failed": its GCP compute instance was requested
  and briefly showed PROVISIONING, then could not be found on the provider
  ("Instance not found on provider" / "can't find created instance"), so it
  never became a Node. This is a cloud-provider (GCP) instance-provisioning
  failure that left the cluster one worker short, NOT resource exhaustion, a
  product bug, or a test-harness problem.

# VERBATIM strings that MUST appear in the cited artifact. Every string below was
# fetched from the public test-platform-results bucket and grep-confirmed present.
expected_evidence:
  - string: "[INFO] Waiting for 6 nodes to be ready..."
    artifact: "artifacts/e2e-gcp-ovn-serial/nodes-readiness/build-log.txt"
  - string: "[ERROR] Timeout reached. 6 ready nodes expected, found 5... Failing."
    artifact: "artifacts/e2e-gcp-ovn-serial/nodes-readiness/build-log.txt"
  - string: "Instance not found on provider"
    artifact: "artifacts/e2e-gcp-ovn-serial/nodes-readiness/artifacts/machines.machine.openshift.io-describe.txt"
  - string: "can't find created instance"
    artifact: "artifacts/e2e-gcp-ovn-serial/nodes-readiness/artifacts/machines.machine.openshift.io-describe.txt"
  - string: 'ci-op-nrvxty03-c278a-7wv2c-worker-c-b2tjb: going into phase "Failed"'
    artifact: "artifacts/e2e-gcp-ovn-serial/gather-extra/artifacts/pods/openshift-machine-api_machine-api-controllers-7ffd4fc4b9-g24gp_machine-controller.log"

# The one signal that separates the true cause from the look-alikes.
discriminating_signal: >-
  The step fails on a node count (6 expected, 5 found), and the missing node maps
  to exactly one Machine in phase "Failed" with STATE "Unknown" and no NODE
  (worker-c-b2tjb), whose GCP provider status went MachineCreationSucceeded then
  InstanceExists=False (Reason InstanceMissing). The instance was created then
  vanished on the GCP side; the machine-controller log contains NO quota,
  capacity, rate-limit, or permission error, so this is a transient GCP instance
  failure, not a quota/capacity limit and not a node that booted but stayed
  NotReady.

# Misleading signals a shallow analysis would wrongly latch onto.
distractors:
  - "The other worker in the same run (worker-f-ql87z) logs OVN warnings ('k8s.ovn.org/node-chassis-id annotation not found', 'ErrorAddingResource') just before it goes NodeReady - normal node bring-up noise, not the cause of the missing node."
  - "The symptom line 'expected 6, found 5' invites stopping at the count or blaming the nodes-readiness test harness, rather than identifying WHICH node is missing and why."
  - "The 5 nodes that did come up are fully Ready and the install and other steps succeeded, tempting a 'flake, just retry' verdict without naming the failed Machine."
  - "GCP machine failures are often quota/capacity (ZONE_RESOURCE_POOL_EXHAUSTED, QUOTA_EXCEEDED); here there is no such error - the create succeeded then the instance disappeared, a different (transient) failure mode."

# Wrong conclusions the judge must penalize.
must_not_conclude:
  - "resource exhaustion / OOM / node memory-disk-PID pressure (there is none; the sixth node never existed to be pressured)"
  - "a product bug in OVN-kubernetes or another operator (the OVN warnings are on a healthy node and are downstream noise)"
  - "GCP quota or zone-capacity exhaustion (no quota/capacity error is present; the instance was created then went missing)"
  - "a test-harness / nodes-readiness bug, or stopping at the symptom 'expected 6, found 5' without identifying the Failed worker Machine"

notes: >
  GCP OVN serial job. The "e2e-gcp-ovn-serial-nodes-readiness" PRE step waits for
  all 6 nodes (3 masters + 3 workers) to be Ready and times out after 30 minutes
  with "6 ready nodes expected, found 5... Failing.", so the serial suite never
  runs. The missing 6th node is worker Machine
  ci-op-nrvxty03-c278a-7wv2c-worker-c-b2tjb (machineset worker-c, zone
  us-central1-c), which is in phase "Failed" with STATE "Unknown" and no NODE.
  Its GCP provider status shows MachineCreationSucceeded then InstanceExists=False
  (Reason: InstanceMissing, "Instance not found on provider"); the machine object
  reports "can't find created instance". The machine-controller created the
  instance (briefly PROVISIONING) but it then disappeared on the GCP side and the
  machine went "Failed" - a cloud-provider instance-provisioning failure, with no
  quota/capacity/permission error anywhere in the machine-controller log.

  The existing references were resource-exhaustion.md + cloud-provider-errors.md;
  resource-exhaustion.md has been removed because nothing ran out of memory, disk,
  PIDs, or etcd space - the node never came into existence. The agent MUST route
  to cloud-provider-errors.md, identify the single Failed worker Machine as the
  missing node, and trace it to the GCP instance that was created then went
  missing - NOT stop at "expected 6, found 5", NOT blame resource exhaustion, and
  NOT blame the test harness or a product operator.

notes: >
  Metal IPI IPv6 (disconnected) cluster bootstrap failure caused by
  cluster-kube-apiserver-operator PR #2032. This is a metal bare-metal job
  using dev-scripts with Ironic for provisioning, in a disconnected IPv6
  environment with squid proxy. The failure occurs at the cluster bootstrap
  stage, meaning the bootstrap node's temporary control plane could not
  properly start. The PR was ultimately reverted
  (https://github.com/openshift/cluster-kube-apiserver-operator/pull/2032).
  This case tests the skill's ability to: (1) handle metal IPI jobs by
  invoking the metal install failure sub-skill, (2) analyze disconnected
  IPv6-specific issues, (3) trace bootstrap failures through bootkube and
  kube-apiserver logs, and (4) correlate the failure with CKAO changes.
  The job name contains "metal" so the skill should set is_metal_job=true
  and invoke the metal-specific analysis skill.

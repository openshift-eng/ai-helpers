failure_stage: "cluster bootstrap"
root_cause_pr: "https://github.com/openshift/cluster-kube-apiserver-operator/pull/2032"
root_cause_component: "cluster-kube-apiserver-operator"
root_cause_description: >
  A change in cluster-kube-apiserver-operator (CKAO PR #2032) caused
  bootstrap failures in metal IPI IPv6 disconnected environments. The PR
  was ultimately reverted to fix the issue. The failure manifested as a
  cluster bootstrap failure where the kube-apiserver could not properly
  start or stabilize during the bootstrap phase.
is_metal_job: true
is_disconnected: true


description: "Behavioral evals for confluence:sync-meeting-notes command"

providers:
  - id: anthropic:claude-agent-sdk
    label: confluence-sync-meeting-notes
    config:
      model: claude-opus-4-6
      plugins:
        - type: local
          path: ../
      append_allowed_tools: ['Bash', 'Skill', 'Read']
      permission_mode: 'auto'

prompts:
  - "{{prompt}}"

defaultTest:
  options:
    provider:
      id: vertex:claude-opus-4-6
      config:
        projectId: "{{ env.ANTHROPIC_VERTEX_PROJECT_ID }}"
        region: global
        temperature: 0
  assert:
    - type: latency
      threshold: 120000
    - type: cost
      threshold: 0.60

tests:
  - description: "sync-meeting-notes/basic-publish"
    metadata: &meta-fast
      token-usage: medium
      judge-size: none
      tier: fast
    vars:
      prompt: |
        Run /confluence:sync-meeting-notes TEAM "Sprint Planning Notes" --parent-id 123456789
        Here are the meeting notes:
        - Attendees: Alice, Bob, Carol
        - Discussion: finalize architecture decision for release
        - Decisions: adopt the new API version strategy
        - Actions: Bob to update the design doc
    assert:
      - type: icontains
        value: "meeting notes"
      - type: icontains
        value: "Attendees"
      - type: icontains
        value: "Action items"

evaluateOptions:
  maxConcurrency: 20

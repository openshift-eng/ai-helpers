description: "Behavioral evals for confluence:create-from-jira command"

providers:
  - id: anthropic:claude-agent-sdk
    label: confluence-create-from-jira
    config:
      model: claude-opus-4-6
      plugins:
        - type: local
          path: ../
      append_allowed_tools: ['Bash', 'Skill', 'Read']
      permission_mode: 'auto'

prompts:
  - "{{prompt}}"

defaultTest:
  options:
    provider:
      id: vertex:claude-opus-4-6
      config:
        projectId: "{{ env.ANTHROPIC_VERTEX_PROJECT_ID }}"
        region: global
        temperature: 0
  assert:
    - type: latency
      threshold: 120000
    - type: cost
      threshold: 0.60

tests:
  - description: "create-from-jira/design-doc"
    metadata: &meta-fast
      token-usage: medium
      judge-size: none
      tier: fast
    vars:
      prompt: |
        Run /confluence:create-from-jira PROJ-100 --space DEV --type design-doc
    assert:
      - type: icontains
        value: "Confluence"
      - type: icontains
        value: "page"

  - description: "create-from-jira/feature-spec"
    metadata: *meta-fast
    vars:
      prompt: |
        Run /confluence:create-from-jira PROJ-200 --space TEAM --type feature-spec
    assert:
      - type: icontains
        value: "feature spec"
      - type: icontains
        value: "Confluence"

evaluateOptions:
  maxConcurrency: 20

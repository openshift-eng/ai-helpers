description: "Routing evals for jira:create skill"

providers:
  - id: anthropic:claude-agent-sdk
    label: create
    config:
      model: claude-opus-4-6
      plugins:
        - type: local
          path: ../
      append_allowed_tools: ['Skill', 'Read']
      permission_mode: 'auto'

prompts:
  - "{{prompt}}"

defaultTest:
  assert:
    - type: skill-used
      value: jira:create
    - type: latency
      threshold: 60000
    - type: cost
      threshold: 0.50

tests:
  - description: "create/story-routing — loads story guidance"
    metadata: &meta-fast
      token-usage: medium
      judge-size: none
      tier: fast
    vars:
      prompt: |
        I want to create a Jira story. What template should I follow for the description?
        Just describe the format — don't create anything.
    assert:
      - type: icontains
        value: "As a"
      - type: icontains
        value: "acceptance criteria"

  - description: "create/bug-routing — loads bug guidance"
    metadata: *meta-fast
    vars:
      prompt: |
        I need to file a bug report in Jira. What sections should the description include?
        Just list the template sections — don't create anything.
    assert:
      - type: icontains
        value: "Steps to Reproduce"
      - type: icontains
        value: "Actual results"

  - description: "create/epic-routing — loads epic guidance"
    metadata: *meta-fast
    vars:
      prompt: |
        I'm creating an epic in Jira. What's the required custom field for Epic Name,
        and what should the description template look like? Just describe — don't create.
    assert:
      - type: icontains
        value: "customfield_10011"
      - type: icontains
        value: "summary"

  - description: "create/feature-request-routing — loads RFE guidance"
    metadata: *meta-fast
    vars:
      prompt: |
        I want to create a feature request. What project should it go in, and what's
        the workflow for collecting the description? Just describe — don't create.
    assert:
      - type: icontains
        value: "RFE"
      - type: icontains
        value: "business"

  - description: "create/task-routing — loads task guidance with task-vs-story distinction"
    metadata: *meta-fast
    vars:
      prompt: |
        I need to create a Jira task for some refactoring work. How do I decide
        whether this should be a task or a story? Just explain — don't create anything.
    assert:
      - type: icontains
        value: "user"
      - type: icontains
        value: "task"

evaluateOptions:
  maxConcurrency: 20

# Generated by Claude Opus 4.5 (Anthropic) - December 2025
#
# RHEL Bug Template
inherits: common/bug.yaml

name: rhel-bug
description: Bug template for RHEL project with RHEL-specific fields
version: 1.0.0
created: 2025-12-09
author: openshift-eng

source:
  repository: "https://github.com/openshift-eng/ai-helpers"
  path: "plugins/jira/templates/common/rhel-bug.yaml"

project_key: RHEL

defaults:
  labels:
    - ai-generated-jira
    - template:rhel-bug

display_format:
  - priority
  - severity
  - summary
  - assignee
  - status

# RHEL-specific description format
description_template: |
  h5. Description of problem

  {{problem_description}}

  h5. Version-Release number of RHEL

  {{version}}

  h5. How reproducible

  {{reproducibility}}

  h5. Steps to Reproduce

  {{#steps}}
  # {{.}}
  {{/steps}}

  h5. Actual results

  {{actual_results}}

  h5. Expected results

  {{expected_results}}

  h5. RHEL Environment

  * Architecture: {{architecture}}
  * Kernel version: {{kernel_version}}
  * Installation type: {{installation_type}}
  {{#additional_context}}

  h5. Additional Context

  {{additional_context}}
  {{/additional_context}}

placeholders:
  - name: problem_description
    description: "Clear description of the problem"
    required: true

  - name: version
    description: "RHEL version (e.g., 9.4, 9.5, 10.0)"
    required: true

  - name: reproducibility
    description: "How often? (Always/Sometimes/Rarely)"
    required: true

  - name: steps
    description: "Steps to reproduce (one per line)"
    required: true
    type: list

  - name: actual_results
    description: "What actually happens?"
    required: true

  - name: expected_results
    description: "What should happen instead?"
    required: true

  - name: architecture
    description: "Architecture (x86_64/aarch64/ppc64le/s390x)"
    required: false
    default: "x86_64"

  - name: kernel_version
    description: "Kernel version (from uname -r)"
    required: false
    default: "Not specified"

  - name: installation_type
    description: "Installation type (minimal/server/workstation/custom)"
    required: false
    default: "server"

  - name: additional_context
    description: "Logs, sosreport, workarounds"
    required: false
    default: ""

jira_fields:
  versions:
    source: version
    required: true

validation:
  summary_max_length: 120
  required_fields:
    - version

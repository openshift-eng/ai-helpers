name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run skillsaw
        uses: stbenjam/skillsaw@c2592a0fe1a86345da838fa16fcda6b55f495178 # v0.11.2
        with:
          strict: true

name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run skillsaw
        uses: stbenjam/skillsaw@b7cb23b15447c510c73b38f6516e356d2a8a95e1 # v0.16.0
        with:
          strict: true

name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run skillsaw
        uses: stbenjam/skillsaw@ac135381fc46711e7615e30b7296e857bb20b645 # v0.14.0
        with:
          strict: true
          version: '0.14.0'

name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run skillsaw
        uses: stbenjam/skillsaw@7fd0fe415cc3e3046fa0bb4d096e2c3e206b461c # v0.11.5
        with:
          strict: true
          version: '0.11.4'

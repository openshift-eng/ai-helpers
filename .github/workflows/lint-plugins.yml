name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run skillsaw
        uses: stbenjam/skillsaw@b7cb23b15447c510c73b38f6516e356d2a8a95e1 # v0.16.0
        with:
          strict: true

name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run skillsaw
        uses: stbenjam/skillsaw@8518bfff9b4991d08e5cf09931761873ff95e5fa # v0.11.1
        with:
          strict: true
          version: '0.11.1'

name: Lint Plugins

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run skillsaw
        uses: stbenjam/skillsaw@674e62bc612ba7740048f24155b27070a3e71d89 # v0.12.1
        with:
          strict: true
          version: '0.11.4'

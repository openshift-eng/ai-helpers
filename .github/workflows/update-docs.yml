name: Update Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'

concurrency:
  group: update-docs
  cancel-in-progress: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Sync marketplace versions
        run: python3 scripts/sync_marketplace_versions.py

      - name: Regenerate documentation
        run: |
          pip install skillsaw==0.11.2
          skillsaw docs -o docs/ --theme crimson-red

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-regenerate plugin documentation and sync versions"
          title: "docs: auto-regenerate plugin documentation"
          body: |
            This PR was automatically generated to update plugin documentation.

            Changes include:
            - Synced plugin versions from plugin.json to marketplace.json
            - Regenerated docs/index.html
          branch: auto-update-docs
          delete-branch: true
          add-paths: |
            docs/
            .claude-plugin/marketplace.json

      - name: Enable auto-merge if only docs changed
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          [[ "$PR_NUMBER" =~ ^[0-9]+$ ]] || { echo "Invalid PR number"; exit 1; }
          FILES_CHANGED=$(gh pr diff "$PR_NUMBER" --name-only)
          if [ "$FILES_CHANGED" = "docs/index.html" ]; then
            gh pr merge "$PR_NUMBER" --auto --squash
          fi

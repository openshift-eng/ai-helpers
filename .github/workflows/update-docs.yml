name: Update Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'
          pip-install: -r requirements-dev.txt

      - name: Sync marketplace versions
        run: python3 scripts/sync_marketplace_versions.py

      - name: Regenerate documentation
        run: skillsaw docs -o docs/ --theme crimson-red

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-regenerate plugin documentation and sync versions"
          title: "docs: auto-regenerate plugin documentation"
          body: |
            This PR was automatically generated to update plugin documentation.

            Changes include:
            - Synced plugin versions from plugin.json to marketplace.json
            - Regenerated docs/index.html
          branch: auto-update-docs
          delete-branch: true
          add-paths: |
            docs/
            .claude-plugin/marketplace.json

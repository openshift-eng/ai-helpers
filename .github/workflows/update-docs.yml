name: Update Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Auto-bump plugin versions
        run: python3 scripts/auto_bump_versions.py "${{ github.event.before }}"

      - name: Sync marketplace versions
        run: python3 scripts/sync_marketplace_versions.py

      - name: Regenerate documentation
        run: |
          python3 scripts/generate_plugin_docs.py
          python3 scripts/build-website.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-bump plugin versions and regenerate docs"
          title: "chore: auto-bump plugin versions and regenerate docs"
          body: |
            This PR was automatically generated after a merge to main.

            Changes include:
            - Auto-bumped patch versions for changed plugins
            - Synced plugin versions from plugin.json to marketplace.json
            - Regenerated PLUGINS.md
            - Regenerated docs/data.json
          branch: auto-update-docs
          delete-branch: true
          add-paths: |
            plugins/*/.claude-plugin/plugin.json
            docs/
            PLUGINS.md
            .claude-plugin/marketplace.json

name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install scanner
        run: pip install "cisco-ai-skill-scanner[vertex]>=2,<3"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Run security scan
        env:
          SKILL_SCANNER_LLM_MODEL: vertex_ai/claude-sonnet-4-6
          VERTEXAI_LOCATION: global
        run: |
          skill-scanner scan-all \
            --recursive \
            --lenient \
            --use-llm \
            --fail-on-severity high \
            --format sarif \
            --output-sarif skill-scanner.sarif \
            --format json \
            --output-json skill-scanner.json \
            --format html \
            --output-html skill-scanner-summary.html \
            .

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: skill-scanner.sarif

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-scan-results
          path: |
            skill-scanner.sarif
            skill-scanner.json
            skill-scanner-summary.html
